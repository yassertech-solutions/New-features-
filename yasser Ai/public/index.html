<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yasser Tech AI</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

h1{color:#38bdf8;margin-top:40px;}

#chatBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#38bdf8;
    padding:15px;
    border-radius:50%;
    cursor:pointer;
}

#chatBox{
    position:fixed;
    bottom:80px;
    right:20px;
    width:300px;
    background:#020617;
    border-radius:10px;
    display:none;
    flex-direction:column;
}

#header{
    background:#38bdf8;
    color:black;
    padding:10px;
}

#messages{
    height:250px;
    overflow-y:auto;
    padding:10px;
    text-align:left;
}

#messages div{margin-bottom:10px;}

input{
    width:100%;
    padding:10px;
    border:none;
}
</style>
</head>

<body>

<h1>🚀 YASSER TECH AI</h1>
<p>Uliza chochote kuhusu Tech & Mafanikio 🤖</p>

<div id="chatBtn" onclick="toggleChat()">🤖</div>

<div id="chatBox">
    <div id="header">Yasser AI</div>
    <div id="messages"></div>
    <input type="text" id="input" placeholder="Andika swali..." onkeypress="enter(event)">
</div>

<script>
function toggleChat(){
    let box = document.getElementById("chatBox");
    box.style.display = box.style.display === "flex" ? "none" : "flex";
}

function enter(e){
    if(e.key==="Enter") send();
}

async function send(){
    let input = document.getElementById("input");
    let msg = input.value;
    if(msg==="") return;

    let chat = document.getElementById("messages");

    chat.innerHTML += "<div>🧑: "+msg+"</div>";

    let res = await fetch("/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({message:msg})
    });

    let data = await res.json();

    chat.innerHTML += "<div>🤖: "+data.reply+"</div>";

    input.value="";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
